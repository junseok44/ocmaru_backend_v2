# 로컬 예시. Docker 이미지는 docker-entrypoint.sh 가 런타임에 /tmp/prometheus.yml 을 생성합니다.
# 환경변수: PROMETHEUS_SCRAPE_TARGET, PROMETHEUS_SCRAPE_SCHEME,
#           PROMETHEUS_SCRAPE_USERNAME, PROMETHEUS_SCRAPE_PASSWORD

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ocmaru-server"
    metrics_path: "/actuator/prometheus"
    scheme: http
    static_configs:
      - targets: ["server:8080"]

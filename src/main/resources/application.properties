spring.application.name=ocmaru

# 로컬 개발 시 spring.profiles.active=local 로 실행하면
# application-local.properties 가 추가로 로드되며, 같은 키는 local 쪽 값으로 덮어씌워집니다.

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ocmaru
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# OAuth (환경변수 주입: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, KAKAO_CLIENT_ID, KAKAO_CLIENT_SECRET, BASE_URL)
# BASE_URL 미설정 시 PUBLIC_URL → HOST 순으로 사용, 모두 없으면 http://localhost:8080
app.oauth.base-url=${BASE_URL:${PUBLIC_URL:${HOST:http://localhost:8080}}}
app.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
app.oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.oauth.kakao.client-id=${KAKAO_CLIENT_ID:}
app.oauth.kakao.client-secret=${KAKAO_CLIENT_SECRET:}

spring.application.name=ocmaru

server.port=${PORT:8080}

# 로컬 개발 시 spring.profiles.active=local 로 실행하면
# application-local.properties 가 추가로 로드되며, 같은 키는 local 쪽 값으로 덮어씌워집니다.

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://host.docker.internal:5432/ocmaru}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=60

# Flyway (마이그레이션: src/main/resources/db/migration/V*.sql)
# spring.flyway.enabled=false / spring.jpa.hibernate.ddl-auto=update 등
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Hibernate ddl-auto 시절 스키마 기준 baseline
spring.flyway.validate-on-migrate=true
spring.flyway.enabled=true
spring.flyway.clean-disabled=true

# JPA / Hibernate (스키마는 Flyway 마이그레이션으로 관리)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Redis (투표 집계 캐시; 로컬은 localhost, Docker Compose 는 REDIS_HOST=redis)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.repositories.enabled=${REDIS_REPOSITORIES_ENABLED:false}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_COMMAND_TIMEOUT:2s}

spring.data.redis.repositories.enabled=false

# 동일 (agendaId, userId) 투표 API 직렬화용 Redis 락 (TTL은 트랜잭션보다 길게 두지 말 것)
app.agenda.vote-lock.enabled=true
app.agenda.vote-lock.wait-timeout-ms=5000
app.agenda.vote-lock.ttl-ms=2000
app.agenda.vote-lock.retry-interval-ms=50

# OAuth (환경변수 주입: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, KAKAO_CLIENT_ID, KAKAO_CLIENT_SECRET, BASE_URL, FRONTEND_URL)
# BASE_URL 미설정 시 PUBLIC_URL → HOST 순으로 사용, 모두 없으면 http://localhost:8080
app.oauth.base-url=${BASE_URL:${PUBLIC_URL:${HOST:http://localhost:8080}}}
# FRONTEND_URL 미설정 시 BASE_URL 값을 재사용
app.oauth.frontend-redirect-url=${FRONTEND_URL:${BASE_URL:${PUBLIC_URL:${HOST:http://localhost:5173}}}}
app.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
app.oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.oauth.kakao.client-id=${KAKAO_CLIENT_ID:}
app.oauth.kakao.client-secret=${KAKAO_CLIENT_SECRET:}

# 클러스터 생성 시 임베딩 API 병렬 호출 개수 (동시에 최대 이만큼의 요청)
app.cluster.embedding.parallelism=${CLUSTER_EMBEDDING_PARALLELISM:8}

# 클러스터 생성 잡: inline(동일 JVM 비동기) | http(서버리스 워커 URL로 POST)
app.cluster.job.dispatch-mode=${CLUSTER_JOB_DISPATCH_MODE:inline}
app.cluster.job.worker-url=${CLUSTER_JOB_WORKER_URL:}
app.cluster.job.internal-api-key=${CLUSTER_JOB_INTERNAL_API_KEY:}
app.cluster.job.inline-synchronous=${CLUSTER_JOB_INLINE_SYNC:false}

# OpenAI (환경변수: OPENAI_API_KEY)
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.whisper-url=https://api.openai.com/v1/audio/transcriptions

# JWT
# 운영에서는 반드시 환경변수로 충분히 긴 랜덤 문자열을 주입하세요.
app.jwt.secret=${JWT_SECRET:change-this-jwt-secret-key-to-at-least-32-characters}
app.jwt.access-token-exp-seconds=${JWT_ACCESS_EXPIRE_SECONDS:3600}
app.jwt.refresh-token-exp-seconds=${JWT_REFRESH_EXPIRE_SECONDS:1209600}

# Swagger / OpenAPI (기본: /swagger-ui/index.html, /v3/api-docs)
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.display-request-duration=true

# Observability (Actuator + Prometheus)
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# SQL query tracing (p6spy)
decorator.datasource.p6spy.enable-logging=false
decorator.datasource.p6spy.logging=slf4j

# Build/app metadata for /actuator/info
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=ocmaru backend service
info.app.version=0.0.1-SNAPSHOT

# --- 공개 파일 저장소 (첨부 등) ---
# local: 기존처럼 app.storage.public-dir 아래 디스크 저장 + /public-objects 로 서빙
# s3: app.storage.s3.* 설정 필요 (버킷, 리전 등은 직접 application.properties 또는 환경변수로 주입)
app.storage.type=${APP_STORAGE_TYPE:local}
app.storage.public-dir=${APP_STORAGE_PUBLIC_DIR:public-objects}
app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET:}
app.storage.s3.region=${APP_STORAGE_S3_REGION:}
app.storage.s3.public-base-url=${APP_STORAGE_S3_PUBLIC_BASE_URL:}
app.storage.s3.endpoint=${APP_STORAGE_S3_ENDPOINT:}
app.storage.s3.access-key=${APP_STORAGE_S3_ACCESS_KEY:}
app.storage.s3.secret-key=${APP_STORAGE_S3_SECRET_KEY:}

# app.storage.type=s3 일 때 (예시 — 실제 값은 환경에 맞게 작성)
# app.storage.s3.region=ap-northeast-2
# 선택: 반환 URL을 고정하고 싶을 때 (CloudFront, MinIO 공개 게이트웨이 등). 비우면 AWS 가상 호스트 스타일 URL 사용
# app.storage.s3.public-base-url=
# 선택: MinIO / LocalStack 등 S3 호환 엔드포인트
# app.storage.s3.endpoint=
# 선택: 위 엔드포인트에 정적 키로 붙일 때 (미설정 시 IAM/환경 기본 자격 증명 체인)
# app.storage.s3.access-key=
# app.storage.s3.secret-key=

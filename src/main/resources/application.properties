spring.application.name=ocmaru

# 로컬 개발 시 spring.profiles.active=local 로 실행하면
# application-local.properties 가 추가로 로드되며, 같은 키는 local 쪽 값으로 덮어씌워집니다.

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://host.docker.internal:5432/ocmaru}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# OAuth (환경변수 주입: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, KAKAO_CLIENT_ID, KAKAO_CLIENT_SECRET, BASE_URL, FRONTEND_URL)
# BASE_URL 미설정 시 PUBLIC_URL → HOST 순으로 사용, 모두 없으면 http://localhost:8080
app.oauth.base-url=${BASE_URL:${PUBLIC_URL:${HOST:http://localhost:8080}}}
# FRONTEND_URL 미설정 시 BASE_URL 값을 재사용
app.oauth.frontend-redirect-url=${FRONTEND_URL:${BASE_URL:${PUBLIC_URL:${HOST:http://localhost:5173}}}}
app.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
app.oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.oauth.kakao.client-id=${KAKAO_CLIENT_ID:}
app.oauth.kakao.client-secret=${KAKAO_CLIENT_SECRET:}

# OpenAI (환경변수: OPENAI_API_KEY)
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.whisper-url=https://api.openai.com/v1/audio/transcriptions

# JWT
# 운영에서는 반드시 환경변수로 충분히 긴 랜덤 문자열을 주입하세요.
app.jwt.secret=${JWT_SECRET:change-this-jwt-secret-key-to-at-least-32-characters}
app.jwt.access-token-exp-seconds=${JWT_ACCESS_EXPIRE_SECONDS:3600}
app.jwt.refresh-token-exp-seconds=${JWT_REFRESH_EXPIRE_SECONDS:1209600}

# Observability (Actuator + Prometheus)
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# Build/app metadata for /actuator/info
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=ocmaru backend service
info.app.version=0.0.1-SNAPSHOT

# --- 공개 파일 저장소 (첨부 등) ---
# local: 기존처럼 app.storage.public-dir 아래 디스크 저장 + /public-objects 로 서빙
# s3: app.storage.s3.* 설정 필요 (버킷, 리전 등은 직접 application.properties 또는 환경변수로 주입)
app.storage.type=${APP_STORAGE_TYPE:local}
app.storage.public-dir=${APP_STORAGE_PUBLIC_DIR:public-objects}

# app.storage.type=s3 일 때 (예시 — 실제 값은 환경에 맞게 작성)
# app.storage.s3.bucket=
# app.storage.s3.region=ap-northeast-2
# 선택: 반환 URL을 고정하고 싶을 때 (CloudFront, MinIO 공개 게이트웨이 등). 비우면 AWS 가상 호스트 스타일 URL 사용
# app.storage.s3.public-base-url=
# 선택: MinIO / LocalStack 등 S3 호환 엔드포인트
# app.storage.s3.endpoint=
# 선택: 위 엔드포인트에 정적 키로 붙일 때 (미설정 시 IAM/환경 기본 자격 증명 체인)
# app.storage.s3.access-key=
# app.storage.s3.secret-key=

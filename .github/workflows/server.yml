# 메인 서버 이미지 빌드·푸시
#
# 필요 Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# 이미지: docker.io/newtonjjang/ocmaru_server

name: Server image

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "Dockerfile.server"
      - ".github/workflows/server.yml"
  workflow_dispatch:

env:
  DOCKER_NS: newtonjjang

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.server
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ env.DOCKER_NS }}/ocmaru_server:latest
            docker.io/${{ env.DOCKER_NS }}/ocmaru_server:${{ github.sha }}


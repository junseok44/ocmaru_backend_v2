services:
  server:
    image: eclipse-temurin:17-jdk-jammy
    working_dir: /workspace/server
    command: sh -c "chmod +x ./gradlew && ./gradlew bootRun --args='--spring.profiles.active=local'"
    ports:
      - "8080:8080"
    volumes:
      - ../server:/workspace/server
      - gradle-cache:/root/.gradle
    environment:
      - BASE_URL=http://localhost:8080
      - FRONTEND_URL=http://localhost:5173

  client:
    image: node:20-bookworm-slim
    working_dir: /workspace/client
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_PROXY_TARGET=http://server:8080
    volumes:
      - ../client:/workspace/client
      - client-node-modules:/workspace/client/node_modules
    depends_on:
      - server

  prometheus:
    image: prom/prometheus:v2.55.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    volumes:
      - ../server/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - server

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ../server/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../server/observability/grafana/dashboards:/var/lib/grafana/dashboards/ocmaru:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  gradle-cache:
  client-node-modules:
  prometheus-data:
  grafana-data:

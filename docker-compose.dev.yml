services:
  server:
    image: eclipse-temurin:17-jdk-jammy
    working_dir: /workspace/server
    # local: application-local.properties | mock-openai: MockEmbeddingClient·MockClusterMetadataClient 사용
    command: sh -c "chmod +x ./gradlew && ./gradlew bootRun --args='--spring.profiles.active=local,mock-openai'"
    ports:
      - "8080:8080"
    cpus: "1.5"
    mem_limit: 1024m
    volumes:
      - ./:/workspace/server
      - gradle-cache:/root/.gradle
    environment:
      - BASE_URL=http://localhost:8080
      - FRONTEND_URL=http://localhost:5173
      - SPRING_PROFILES_ACTIVE=local,mock-openai
      # 부하/실험 전용 DB를 Postgres에 새로 만들었다면 URL만 바꿔서 사용 (기본은 application-local의 ocmaru)
      # - DB_URL=jdbc:postgresql://host.docker.internal:5432/ocmaru_loadtest
      # 의견 시드(OpinionDataSeeder): 기동 시 한 번만 넣으려면 예시처럼 활성화
      # - APP_SEED_ENABLED=true
      # - APP_SEED_USER_COUNT=10
      # - APP_SEED_OPINIONS_PER_USER=700

  client:
    image: node:20-bookworm-slim
    working_dir: /workspace/client
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_PROXY_TARGET=http://server:8080
    volumes:
      - ../client:/workspace/client
      - client-node-modules:/workspace/client/node_modules
    depends_on:
      - server

  prometheus:
    image: prom/prometheus:v2.55.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    volumes:
      - ../server/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - server

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ../server/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../server/observability/grafana/dashboards:/var/lib/grafana/dashboards/ocmaru:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  gradle-cache:
  client-node-modules:
  prometheus-data:
  grafana-data:

# 앱 개발 스택. 관측 스택과 같은 Docker 네트워크를 쓰려면 최초 1회:
#   docker network create ocmaru-public
# 그 다음: docker compose -f docker-compose.observability.yml up -d
# 이때 Prometheus 의 PROMETHEUS_SCRAPE_TARGET=server:8080 으로 스크랩 가능

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - ocmaru-public

  server:
    image: eclipse-temurin:17-jdk-jammy
    working_dir: /workspace/server
    # local: application-local.properties | mock-openai: MockEmbeddingClient·MockClusterMetadataClient 사용
    command: sh -c "chmod +x ./gradlew && ./gradlew bootRun"
    ports:
      - "8080:8080"
    cpus: "1.5"
    mem_limit: 1024m
    volumes:
      - ./:/workspace/server
      - gradle-cache:/root/.gradle
    env_file:
      - .env.local
    depends_on:
      - redis
    networks:
      - ocmaru-public

  client:
    image: node:20-bookworm-slim
    working_dir: /workspace/client
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_PROXY_TARGET=http://server:8080
    volumes:
      - ../client:/workspace/client
      - client-node-modules:/workspace/client/node_modules
    depends_on:
      - server
    networks:
      - ocmaru-public

volumes:
  gradle-cache:
  client-node-modules:
  redis-data:

networks:
  ocmaru-public:
    external: true

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  server:
    image: eclipse-temurin:17-jdk-jammy
    working_dir: /workspace/server
    # local: application-local.properties | mock-openai: MockEmbeddingClient·MockClusterMetadataClient 사용
    command: sh -c "chmod +x ./gradlew && ./gradlew bootRun"
    ports:
      - "8080:8080"
    cpus: "1.5"
    mem_limit: 1024m
    volumes:
      - ./:/workspace/server
      - gradle-cache:/root/.gradle
    env_file:
      - .env.local
    depends_on:
      - redis

  client:
    image: node:20-bookworm-slim
    working_dir: /workspace/client
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_PROXY_TARGET=http://server:8080
    volumes:
      - ../client:/workspace/client
      - client-node-modules:/workspace/client/node_modules
    depends_on:
      - server

  prometheus:
    build:
      context: ./observability/prometheus
      dockerfile: Dockerfile
    environment:
      PROMETHEUS_SCRAPE_TARGET: server:8080
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    depends_on:
      - server

  grafana:
    build:
      context: ./observability
      dockerfile: grafana/Dockerfile
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GRAFANA_PROMETHEUS_DATASOURCE_URL: http://prometheus:9090
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  gradle-cache:
  client-node-modules:
  redis-data:
  prometheus-data:
  grafana-data:
